name: Lock Repo By UDID
on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      udid:
        description: 'Device UDID to allow'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: sudo apt update && sudo apt install dpkg-dev zstd -y

      - name: Read UDID whitelist
        id: whitelist
        run: |
          list=$(cat udid.txt | grep -v '^#' | grep -v '^$' | awk '{print $1}' | tr '\n' '|' | sed 's/|$//')
          echo "list=$list" >> $GITHUB_OUTPUT

      - name: Generate repo files
        run: |
          cp Release.empty Release
          echo "" > Packages
          echo "" > Packages.zst

          if [ -n "${{ inputs.udid }}" ] && echo "${{ inputs.udid }}" | grep -qE "^(${{ steps.whitelist.outputs.list }})$"; then
            echo "✅ Allowed UDID, restoring full repo"
            dpkg-scanpackages debs /dev/null > Packages
            zstd -f Packages > Packages.zst
            cat > Release <<'EOF'
Origin:  XY's Repo
Label:  XY's Repo
Suite: stable
Codename: stable
Version: 1.0
Architectures: iphoneos-arm64 iphoneos-arm64e
Components: main
Description: 私人源
EOF
          fi

      - name: Commit changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add Release Packages Packages.zst
          git commit -m "Update repo with UDID check" || true
          git push
