name: Lock Repo By UDID
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install tools
        run: sudo apt update && sudo apt install dpkg-dev zstd -y

      - name: Read UDID whitelist
        id: whitelist
        run: |
          list=$(cat udid.txt | grep -v '^#' | grep -v '^$' | awk '{print $1}' | tr '\n' '|' | sed 's/|$//')
          echo "list=$list" >> $GITHUB_OUTPUT

      - name: Generate repo files
        run: |
          # 默认给未授权设备返回无效 Release
          cp Release.empty Release
          echo "" > Packages
          echo "" > Packages.zst

          # 如果是授权设备，恢复完整源
          if [ -n "${{ github.event.client_payload.udid }}" ] && echo "${{ github.event.client_payload.udid }}" | grep -qE "^(${{ steps.whitelist.outputs.list }})$"; then
            echo "✅ Allowed UDID, restoring full repo"
            dpkg-scanpackages debs /dev/null > Packages
            zstd -f Packages > Packages.zst
            cat > Release <<'EOF'
Origin:  XY's Repo
Label:  XY's Repo
Suite: stable
Codename: stable
Version: 1.0
Architectures: iphoneos-arm64 iphoneos-arm64e
Components: main
Description: 私人源
EOF
          fi

      - name: Commit changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add Release Packages Packages.zst
          git commit -m "Update repo with UDID check" || true
          git push
